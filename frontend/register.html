<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Resume Analyzer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Transparent Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Resume Analyzer</a>
            <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex gap-3 mt-3 mt-lg-0">
                    <a href="login.html" class="btn-custom-outline">Login</a>
                    <a href="register.html" class="btn-custom-primary active">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Animated Ambient Glow Background -->
    <div class="hero-glow" style="top: 70%; left: 70%;"></div>

    <div class="container auth-container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="glass-card">
                    <h3 class="text-center fw-bold mb-4">Create Account</h3>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label text-muted small">Full Name</label>
                            <input type="text" class="form-control form-control-custom" id="name" placeholder="John Doe"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label text-muted small">Email address</label>
                            <input type="email" class="form-control form-control-custom" id="regEmail"
                                placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="regPassword" class="form-label text-muted small">Password</label>
                            <input type="password" class="form-control form-control-custom" id="regPassword"
                                placeholder="Create a password" required>
                        </div>
                        <button type="submit" class="btn-custom-primary w-100 py-2">Register</button>
                    </form>

                    <p id="regMessage" class="text-center mt-3 text-danger small"></p>

                    <p class="text-center text-muted small mt-4">
                        Already have an account? <a href="login.html" class="text-decoration-none"
                            style="color: var(--primary-color)">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS & App JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
