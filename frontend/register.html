<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Resume Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Resume Analyzer</a>
            <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex gap-3 mt-3 mt-lg-0">
                    <a href="login.html" class="btn-custom-outline">Login</a>
                    <a href="register.html" class="btn-custom-primary active">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="hero-glow" style="top: 70%; left: 70%;"></div>

    <div class="container auth-container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="glass-card">

                    <!-- Card Icon -->
                    <div class="auth-icon-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"/></svg>
                    </div>

                    <h3 class="text-center fw-bold mb-1">Create Account</h3>
                    <p class="text-center text-muted small mb-4">Join and start analyzing your resume with AI</p>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label text-muted small">Full Name</label>
                            <input type="text" class="form-control form-control-custom" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label text-muted small">Email address</label>
                            <input type="email" class="form-control form-control-custom" id="regEmail" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-2">
                            <label for="regPassword" class="form-label text-muted small">Password</label>
                            <div class="input-password-wrap">
                                <input type="password" class="form-control form-control-custom" id="regPassword"
                                    placeholder="Create a strong password" required oninput="checkStrength(this.value)">
                                <button type="button" class="password-toggle" onclick="toggleRegPwd()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                </button>
                            </div>
                        </div>

                        <!-- Password Strength Bar -->
                        <div class="mb-4">
                            <div class="strength-bar-wrap">
                                <div class="strength-bar" id="strengthBar"></div>
                            </div>
                            <p class="strength-label" id="strengthLabel">Enter a password</p>
                        </div>

                        <button type="submit" class="btn-custom-primary w-100 py-2">Create Account</button>
                    </form>

                    <p id="regMessage" class="text-center mt-3 text-danger small"></p>

                    <p class="text-center text-muted small mt-4">
                        Already have an account? <a href="login.html" class="text-decoration-none" style="color: var(--primary-color)">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function toggleRegPwd() {
            const pwd = document.getElementById('regPassword');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }
        function checkStrength(val) {
            const bar = document.getElementById('strengthBar');
            const label = document.getElementById('strengthLabel');
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;
            const levels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['', '#ef4444', '#f97316', '#eab308', '#10b981'];
            const widths = ['0%', '25%', '50%', '75%', '100%'];
            bar.style.width = widths[strength];
            bar.style.background = colors[strength];
            label.textContent = val.length === 0 ? 'Enter a password' : levels[strength];
            label.style.color = colors[strength] || 'var(--text-muted)';
        }
    </script>
</body>

</html>
