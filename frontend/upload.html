<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Upload Resume & Analyze</h3>

        <form id="uploadForm">
            <input type="file" id="resumeFile" class="form-control mb-3" required>
            <textarea id="jobDescription" class="form-control mb-3" placeholder="Paste Job Description"></textarea>
            <button class="btn btn-success w-100">Analyze</button>
        </form>

        <div id="loading" class="text-center mt-3 d-none">
            <div class="spinner-border text-primary"></div>
            <p>Analyzing...</p>
        </div>

        <div id="resultCard" class="card mt-4 p-3 d-none">
            <h5>Match Score:</h5>
            <h2 id="matchScore" class="text-success"></h2>
            <h6>Missing Skills:</h6>
            <ul id="missingSkills"></ul>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
