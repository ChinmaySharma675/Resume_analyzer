<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | Resume Analyzer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Transparent Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Resume Analyzer</a>

            <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="upload.html">Upload</a>
                    </li>
                </ul>
                <div class="d-flex gap-3 mt-3 mt-lg-0">
                    <button onclick="logout()" class="btn btn-danger-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Animated Ambient Glow Background -->
    <div class="hero-glow" style="top: 30%; left: 80%;"></div>

    <div class="container page-container">
        <div class="row w-100 justify-content-center m-0">
            <div class="col-lg-8">

                <h2 class="fw-bold mb-4 text-center">Analyze Resume Context</h2>

                <div class="glass-card mb-5">
                    <form id="uploadForm">
                        <div class="mb-4">
                            <label for="resumeFile" class="form-label text-muted small fw-bold">Upload Document
                                (PDF/DOCX)</label>
                            <input type="file" id="resumeFile" class="form-control form-control-custom"
                                accept=".pdf,.doc,.docx" required>
                        </div>

                        <div class="mb-5">
                            <label for="jobDescription" class="form-label text-muted small fw-bold">Target Job
                                Description</label>
                            <textarea id="jobDescription" class="form-control form-control-custom" rows="6"
                                placeholder="Paste the full job description here to extract contextual keywords..."
                                required></textarea>
                        </div>

                        <button type="submit" class="btn-success-gradient w-100 py-3 fs-5">Calculate Match
                            Score</button>
                    </form>

                    <!-- Loading State -->
                    <div id="loading" class="text-center mt-5 d-none">
                        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                        </div>
                        <h5 class="text-muted">Running Context-Aware AI Screen...</h5>
                    </div>
                </div>

                <!-- Result Card -->
                <div id="resultCard" class="glass-card mt-4 d-none text-center">
                    <h5 class="text-muted text-uppercase tracking-wide mb-2">Compatibility Score</h5>
                    <h2 id="matchScore" class="mb-4"></h2>

                    <div class="text-start mt-4 pt-4 border-top" style="border-color: var(--glass-border) !important;">
                        <h6 class="text-muted mb-3"><i class="bi bi-exclamation-triangle-fill"></i> Suggested Missing
                            Skills:</h6>
                        <ul id="missingSkills"></ul>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS & App JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
