<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Resume Analyzer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Transparent Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Resume Analyzer</a>

            <!-- Dashboard specific nav items -->
            <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="upload.html">Upload</a>
                    </li>
                </ul>
                <div class="d-flex gap-3 mt-3 mt-lg-0">
                    <button onclick="logout()" class="btn btn-danger-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Animated Ambient Glow Background -->
    <div class="hero-glow" style="top: 40%; left: 50%;"></div>

    <!-- Dashboard Content -->
    <div class="container page-container">

        <div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-secondary pb-3">
            <h2 class="fw-bold m-0">Overview</h2>
            <a href="upload.html" class="btn-custom-primary">New Analysis</a>
        </div>

        <div class="row g-4 mb-5">
            <!-- Stat Card 1 -->
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Total Uploads</h5>
                    <h3 id="totalUploads">0</h3>
                </div>
            </div>

            <!-- Stat Card 2 -->
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Average Score</h5>
                    <h3 id="avgScore">0%</h3>
                </div>
            </div>

            <!-- Stat Card 3 -->
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Highest Score</h5>
                    <h3 id="highestScore">0%</h3>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS & App JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
